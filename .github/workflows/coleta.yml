name: Coleta de Dados e Atualização do Dashboard

on:
  schedule:
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar-e-publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Restaurar cache de dados
        uses: actions/cache@v4
        with:
          path: data/cache
          key: cache-dados-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            cache-dados-${{ runner.os }}-

      - name: Executar pipeline (coleta)
        run: python src/pipeline.py --force
        env:
          PYTHONPATH: src
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}

      - name: Executar modelo (sinais preditivos)
        run: python src/modelo.py
        env:
          PYTHONPATH: src

      - name: Gerar dashboard
        run: python src/gerar_dashboard.py
        env:
          PYTHONPATH: src

      - name: Verificar mudanças
        id: check_changes
        run: |
          git diff --quiet docs/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit e push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "Meridian Bot"
          git config user.email "bot@meridian-commodities"
          git add docs/
          git add data/cache/ || true
          git commit -m "📊 Atualização automática $(date +'%d/%m/%Y %H:%M') BRT"
          git push

      - name: Resumo da execução
        if: always()
        run: |
          echo "=== Sinais do Modelo ==="
          cat data/cache/sinais_modelo.json 2>/dev/null || echo "Sem sinais"
          echo "=== Status da Coleta ==="
          cat data/cache/ultimo_status.json 2>/dev/null || echo "Sem status"
          echo "=== Arquivos em docs/ ==="
          ls -lh docs/
